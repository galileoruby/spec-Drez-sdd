{% from "macros/icons.html" import icon %}

<article class="tarjeta-metrica" aria-label="{{ metrica.titulo }}">
  <div class="tarjeta-metrica__head">
    <span class="tarjeta-metrica__icon-wrap" aria-hidden="true">
      {{ icon(metrica.icono, 18) }}
    </span>
    <p class="tarjeta-metrica__titulo">{{ metrica.titulo }}</p>
  </div>
  <p class="tarjeta-metrica__valor">{{ metrica.valor }}</p>
  {% if metrica.tendencia | default('') %}
    <p class="tarjeta-metrica__tendencia tarjeta-metrica__tendencia--{{ 'positiva' if metrica.tendencia.startswith('+') else ('negativa' if metrica.tendencia.startswith('-') else 'neutra') }}">{{ metrica.tendencia }}</p>
  {% endif %}
</article>
